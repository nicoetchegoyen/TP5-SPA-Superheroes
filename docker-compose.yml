version: '3.8'

services:
  # 1. Base de Datos
  superheroe_db:
    image: mongo:latest
    container_name: superheroe_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # 2. Tu aplicación Flask
  mibackend:
    build: .
    container_name: mibackend
    ports:
      - "5001:5001"
    depends_on:
      - superheroe_db

  # 3. Servidor Web / Puerta de entrada
  mifrontend:
    image: nginx:alpine
    container_name: mifrontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - mibackend

volumes:
  mongo_data: